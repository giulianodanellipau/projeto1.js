<!DOCTYPE html>
<html lang="pt - BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Filmes . 🎥</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header id="headerfooter"><h1>SENAIFLIX</h1></header>
    <h2 id="textshadow">Cadastro de Filmes: 🎥</h2>
    <input type="text" id="titulo" placeholder="Digite um título">
    <input type="number" id="ano" placeholder="Digite o ano">
    <input type="text" id="classificacao" placeholder="Classificação">
    <button id="btnCadastrar">Cadastrar: 🎥</button>
    <h3 id="textshadow">Filtrar por classificação: 🎥</h3>
    <input type="text" id="filtroClassificacao" placeholder="Classificação">
    <button id="btnFiltrarClassificacao">Filtrar: 🎥</button>
    <h3 id="textshadow2">Filtrar por ano: 🎥</h3>
    <input type="number" id="filtroAno" placeholder="Digite o ano">
    <button id="btnFiltrarAno">Filtrar: 🎥</button>

    <h3 id="textshadow">Filmes cadastrados aqui: 🎥</h3>
    <p id="listaFilmes"></p>

    <footer id="headerfooter">&copy;Copyright 2026 SENAIFLIX</footer>
</body>

</html>
